<!DOCTYPE html>
<html lang="ky">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кыргызстан ULTRA Тест</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(120deg,#ffcc00,#ff6600);transition:0.3s;}
.dark{background:#121212;color:white;}
header{background:crimson;color:white;text-align:center;padding:20px;position:relative;}
.toggle{cursor:pointer;position:absolute;top:15px;right:15px;font-size:22px;}
.container{max-width:900px;margin:auto;padding:20px;}
.card{background:white;padding:25px;border-radius:20px;margin-top:25px;box-shadow:0 5px 15px rgba(0,0,0,0.3);transition:0.5s;opacity:1;transform:translateY(0);}
.dark .card{background:#1e1e1e;}
button{width:100%;padding:14px;margin:10px 0;border:none;border-radius:12px;background:green;color:white;font-size:18px;cursor:pointer;transition:0.3s;}
button:hover{background:limegreen;}
#progress{height:12px;background:#ddd;border-radius:6px;margin-top:10px;position:relative;}
#progress-bar{height:12px;width:0%;background:green;border-radius:6px;transition:0.5s;}
#percent{position:absolute;right:10px;top:-2px;font-weight:bold;}
img{width:100%;border-radius:12px;margin-top:15px;transition:0.5s;max-height:300px;object-fit:cover;}
#timer{color:red;font-size:20px;font-weight:bold;}
.fade{opacity:0;transform:translateY(20px);transition:opacity 0.5s, transform 0.5s;}
@media (max-width:768px){
  header h2{font-size:20px;}
  button{font-size:16px;padding:12px;}
  img{max-height:200px;}
  #timer{font-size:18px;}
}
@media (max-width:480px){
  header h2{font-size:18px;}
  button{font-size:14px;padding:10px;}
  img{max-height:150px;}
  #timer{font-size:16px;}
}
</style>
</head>
<body>
<header>
<h2>🇰🇬 Кыргызстан ULTRA Тест</h2>
<span class="toggle" onclick="toggleDark()">🌙</span>
</header>
<div class="container">
<div id="progress"><div id="progress-bar"></div><span id="percent">0%</span></div>

<div class="card" id="card">
<p>⏱ Убакыт: <span id="timer">120</span></p>
<h3 id="question"></h3>
<img id="image" src="">
<div id="answers"></div>
</div>

<div class="card">
<p id="result"></p>
<button onclick="restart()">🔁 Кайра баштоо</button>
</div>
</div>

<audio id="ok" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="bad" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>
const questionEl = document.getElementById("question");
const imageEl = document.getElementById("image");
const answersEl = document.getElementById("answers");
const progressBar = document.getElementById("progress-bar");
const percentEl = document.getElementById("percent");
const timerEl = document.getElementById("timer");
const resultEl = document.getElementById("result");

const ok = document.getElementById("ok");
const bad = document.getElementById("bad");

const questions=[
{q:"Кыргыздардын улуттук үйү?", img:"https://upload.wikimedia.org/wikipedia/commons/3/3f/Kyrgyz_yurt.jpg", a:["Боз үй","Сарай","Чатыр","Үй"], c:0},
{q:"Кыргызстандын борбору?", img:"https://upload.wikimedia.org/wikipedia/commons/d/d5/Bishkek.jpg", a:["Ош","Бишкек","Нарын","Талас"], c:1},
{q:"Кыргыз улуттук тамагы?", img:"https://upload.wikimedia.org/wikipedia/commons/6/6b/Beshbarmak.jpg", a:["Плов","Манты","Бешбармак","Самса"], c:2},
{q:"Кыргыз эпосу?", img:"https://upload.wikimedia.org/wikipedia/commons/5/5c/Manaschi.jpg", a:["Манас","Одиссея","Илиада","Алпамыш"], c:0},
{q:"Кыргызстан кайсы материкте?", img:"", a:["Европа","Азия","Африка","Америка"], c:1},
{q:"Кыргызстандын акчасы?", img:"", a:["Сом","Рубль","Теңге","Доллар"], c:0},
{q:"Кыргызстандын желеги түсү?", img:"", a:["Кызыл","Көк","Жашыл","Ак"], c:0},
{q:"Белгилүү көл?", img:"", a:["Ысык-Көл","Балхаш","Байкал","Каспий"], c:0},
{q:"Улуттук оюн?", img:"", a:["Көк бөрү","Футбол","Теннис","Баскетбол"], c:0},
{q:"Кыргыз тили?", img:"", a:["Түрк","Славян","Кытай","Араб"], c:0},
{q:"Коңшу өлкө?", img:"", a:["Казакстан","Франция","АКШ","Япония"], c:0},
{q:"Дин?", img:"", a:["Ислам","Буддизм","Христиан","Индус"], c:0},
{q:"Облус саны?", img:"", a:["7","5","10","3"], c:0},
{q:"Көз карандысыздык күнү?", img:"", a:["31-август","1-январь","9-май","7-ноябрь"], c:0},
{q:"Кыргыз тоолору?", img:"", a:["Ала-Тоо","Гималай","Альпы","Урал"], c:0},
{q:"Улуттук баш кийим?", img:"", a:["Ак калпак","Кепка","Шапка","Берет"], c:0},
{q:"Улуттук суусундук?", img:"", a:["Кымыз","Сок","Чай","Суу"], c:0},
{q:"Кыргызстандагы элдер?", img:"", a:["Көп улуттуу","Бир эле улут","Жок","Аз"], c:0},
{q:"Өзбек тамагы?", img:"", a:["Плов","Бешбармак","Пицца","Суши"], c:0},
{q:"Дунган ашканасы?", img:"", a:["Кытайга жакын","Европа","Америка","Африка"], c:0}
];

let i=0,score=0,time=120;

function load(){
  if(i>=questions.length){ finish(); return; }
  const q=questions[i];
  const card=document.getElementById('card');
  card.classList.add('fade');
  setTimeout(()=>{
      questionEl.innerText=q.q;
      imageEl.src=q.img;
      answersEl.innerHTML="";
      q.a.forEach((ans,index)=>{
        answersEl.innerHTML+=`<button onclick="ans(${index})">${ans}</button>`;
      });
      progressBar.style.width=(i/questions.length*100)+"%";
      percentEl.innerText=Math.round(i/questions.length*100)+"%";
      card.classList.remove('fade');
  },300);
}

function ans(index){
  if(index===questions[i].c){ score++; ok.play(); } else { bad.play(); }
  i++; load();
}

function finish(){
  let grade=score>=18?"A 🏆":score>=14?"B 👍":"C 😅";
  questionEl.innerText="Тест бүттү!";
  answersEl.innerHTML="";
  resultEl.innerText="Жыйынтык: "+score+"/20 | Баа: "+grade;
}

function restart(){ i=0; score=0; time=120; load(); }
function toggleDark(){ document.body.classList.toggle("dark"); }

setInterval(()=>{
  time--; timerEl.innerText=time;
  if(time<=0) finish();
},1000);

load();
</script>
</body>
</html>
